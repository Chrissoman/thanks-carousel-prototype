<!-- ============================================================
     THANKS CAROUSEL EMBED — single source of truth.
     Served into index.html (marker <!--THANKS_EMBED--\>) and
     injected into saved partner pages by server.js.
     Everything is scoped under .thanks-proto; absolute asset URLs
     so it works from any route.
     ============================================================ -->
<div class="thanks-proto">

  <section class="carousel" aria-roledescription="carousel" aria-label="Exclusive offers for you">

    <div class="carousel__head">
      <h2 class="carousel__title">You've unlocked rewards and offers...</h2>
    </div>

    <!-- Scroll viewport: native scroll-snap handles trackpad + swipe -->
    <div class="carousel__viewport" data-viewport tabindex="0" aria-label="Offers, use arrow keys to navigate">
      <ul class="carousel__track" data-track>
        <!-- slides injected by JS -->
      </ul>
    </div>

    <!-- Pagination row: dots + bare play/pause icon -->
    <div class="carousel__pagination">
      <div class="carousel__progress" data-progress role="tablist" aria-label="Choose offer">
        <!-- dots injected by JS -->
      </div>
      <!-- custom glyphs from Figma "controls" (229:6447) — drawn on the
           24×24 chip grid; fill comes from currentColor -->
      <button class="carousel__playpause" type="button" aria-label="Pause offers" data-playpause>
        <svg class="icon-pause" viewBox="0 0 24 24" aria-hidden="true"><rect x="8" y="8" width="3" height="8" rx="1"/><rect x="13" y="8" width="3" height="8" rx="1"/></svg>
        <svg class="icon-play" viewBox="0 0 24 24" aria-hidden="true"><path d="M9.25 8.80425C9.25 8.01881 10.114 7.53997 10.78 7.95625L15.8932 11.152C16.5199 11.5437 16.5199 12.4563 15.8932 12.848L10.78 16.0438C10.114 16.46 9.25 15.9812 9.25 15.1958V8.80425Z"/></svg>
        <svg class="icon-replay" viewBox="0 0 24 24" aria-hidden="true"><path transform="translate(6.2 6.2) scale(0.48)" d="M12 5V2.5a.5.5 0 0 0-.82-.39l-4.5 3.5a.5.5 0 0 0 0 .78l4.5 3.5A.5.5 0 0 0 12 9.5V7a5.5 5.5 0 1 1-5.48 6l-1.99.25A7.5 7.5 0 1 0 12 5Z"/></svg>
      </button>
    </div>

    <!-- Attribution footer (config-toggleable) — Figma "Card in unit" -->
    <div class="carousel__footer">
      <span class="carousel__attribution"><span class="soft">A</span> Thanks <span class="soft">moment</span></span>
      <span class="carousel__terms">Terms · Privacy</span>
    </div>

    <!-- Edge fade over the peeking card (brand direction, snap start) -->
    <div class="carousel__edgefade" aria-hidden="true"></div>

  </section>

  <!-- Settings cog + fine-tuning panel (fixed position, prototype-only) -->
  <button class="settings-cog" type="button" aria-label="Open settings" data-settings-open>
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
    </svg>
  </button>

  <aside class="settings-panel" data-settings-panel aria-hidden="true" aria-label="Carousel settings">
    <div class="settings-panel__head">
      <h3>Fine-tune</h3>
      <button type="button" class="settings-panel__close" aria-label="Close settings" data-settings-close>&times;</button>
    </div>
    <div class="settings-tabs" data-settings-tabs role="tablist" aria-label="Setting categories">
      <!-- tabs injected by JS -->
    </div>
    <div class="settings-panel__body" data-settings-body>
      <!-- controls injected by JS -->
    </div>
  </aside>

  <!-- relative paths: resolve correctly at "/" (local server) AND
       under a subpath (GitHub Pages project site) -->
  <link rel="stylesheet" href="styles.css" />
  <script src="carousel.js" defer></script>
</div>
